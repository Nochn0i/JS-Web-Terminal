<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Terminal - LartzCode.pvt.ltd</title>
    <style>
      body {
        background: #000;
        margin: 0;
        padding: 10px;
      }
      #terminal {
        width: 100svw;
        height: 100svh;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/node_modules/xterm/lib/xterm.js"></script>

    <script>
      const socket = io();

      const term = new Terminal({
        cursorBlink: true,
        theme: { background: "#1e1e1e" },
      });

      term.open(document.getElementById("terminal"));

      term.onData((data) => {
        socket.emit("terminal-input", data);
      });

      socket.on("terminal-output", (data) => {
        term.write(data);
      });

      setInterval(
        () => (document.querySelector(".xterm-scroll-area").style.height = 0),
        1,
      );
    </script>
  </body>
</html>
